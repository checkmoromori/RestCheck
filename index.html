<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestCheck - Restaurant Kritiker</title>
  <style>
    :root {
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --text-color: #2d3748;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --border: #e2e8f0;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
      color: var(--primary);
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
    }

    .file-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .file-btn {
      background: #f1f5f9;
      border: 1.5px dashed #cbd5e1;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .file-btn.has-photo {
      background: #ecfdf5;
      border-color: #10b981;
      color: #065f46;
    }

    input[type="file"] {
      display: none;
    }

    #previewImg {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
      border: 1px solid var(--border);
    }

    button.submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.submit-btn:hover {
      background: var(--primary-hover);
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background: #f8fafc;
      border-left: 4px solid var(--primary);
      display: none;
      white-space: pre-line;
      line-height: 1.6;
    }

    .loading-spinner {
      text-align: center;
      color: #64748b;
      margin-top: 15px;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔍 RestCheck</h1>
  
  <div class="input-group">
    <label for="nameInput">Name des Restaurants</label>
    <input type="text" id="nameInput" placeholder="Z. B. Aposto">
  </div>

  <div class="input-group">
    <label for="cityInput">Ort / Stadt (Europaweit)</label>
    <input type="text" id="cityInput" placeholder="Z. B. Aalen">
  </div>

  <div class="input-group">
    <label for="linkInput">Google Maps Link (Alternativ)</label>
    <input type="text" id="linkInput" placeholder="Link hier einfügen...">
  </div>

  <div class="file-buttons">
    <label class="file-btn" id="cameraBtn">
      <span>📸 Kamera</span>
      <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(this)">
    </label>
    <label class="file-btn" id="galleryBtn">
      <span>🖼️ Galerie</span>
      <input type="file" accept="image/*" onchange="handlePhoto(this)">
    </label>
  </div>

  <img id="previewImg" alt="Vorschau">

  <button class="submit-btn" onclick="analyze()">Prüfen</button>

  <div class="loading-spinner" id="spinner">Wird geladen...</div>
  <div id="output"></div>
</div>

<script>
const SYSTEM_PROMPT = "Du bist ein erfahrener Restaurant-Kritiker. Analysiere das vom Nutzer genannte Restaurant gründlich mithilfe der Google-Suche. Finde heraus, ob es sich um eine Kette/Franchise oder einen unabhängigen Familienbetrieb handelt und wie alt bzw. traditionsreich das Restaurant ist. Fülle das JSON-Schema detailliert, wahrheitsgemäß und in sauberem Deutsch aus.";

let photoBase64 = null, photoMime = null;

// Foto-Upload verarbeiten
function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    photoBase64 = dataUrl.split(',')[1];
    photoMime = file.type;
    
    // Bild-Vorschau anzeigen
    const preview = document.getElementById('previewImg');
    preview.src = dataUrl;
    preview.style.display = 'block';
    
    // Knöpfe grün färben
    document.getElementById('cameraBtn').classList.add('has-photo');
    document.getElementById('galleryBtn').classList.add('has-photo');
    document.getElementById('cameraBtn').innerHTML = '<span>✓</span><span>Foto geladen</span>';
    document.getElementById('galleryBtn').innerHTML = '<span>✓</span><span>Foto geladen</span>';
  };
  reader.readAsDataURL(file);
}

// Lade-Anzeige umschalten
function setLoading(message) {
  const spinner = document.getElementById('spinner');
  const output = document.getElementById('output');
  if (message) {
    spinner.innerText = message;
    spinner.style.display = 'block';
    output.style.display = 'none';
  } else {
    spinner.style.display = 'none';
  }
}

// Ergebnis anzeigen
function showResult(text) {
  setLoading(false);
  const output = document.getElementById('output');
  output.innerHTML = text;
  output.style.display = 'block';
}

// Fehler anzeigen
function showError(message) {
  setLoading(false);
  const output = document.getElementById('output');
  output.innerHTML = `<span style="color: #dc2626; font-weight: 600;">⚠️ ${message}</span>`;
  output.style.display = 'block';
}

// Die Hauptanalyse
async function analyze() {
  const name = document.getElementById('nameInput').value.trim();
  let city = document.getElementById('cityInput').value.trim();
  const link = document.getElementById('linkInput').value.trim();
  
  // ZWINGENDE ABFRAGE: Wenn ein Foto da ist, aber kein Ort eingegeben wurde
  if (photoBase64 && !city) {
    const urlaubsort = prompt("In welchem Ort oder Land befindet sich das Restaurant auf dem Foto?");
    if (urlaubsort) {
      city = urlaubsort.trim();
      document.getElementById('cityInput').value = city;
    }
  }

  const parts = [];

  if (photoBase64) {
    setLoading('Foto wird vorbereitet...');
    parts.push({ inlineData: { mimeType: photoMime, data: photoBase64 } });
    let textPart = 'Bitte lies den Restaurantnamen von diesem Schild ab.';
    if (city) textPart += ` Das Restaurant befindet sich in: ${city}.`;
    textPart += ' Nutze die Google-Suche, um es zu finden und fülle das JSON-Schema aus.';
    if (name) textPart += ` (Nutzerhinweis zum Namen: ${name})`;
    parts.push({ text: textPart });
  } else if (link) {
    setLoading('Link wird verarbeitet...');
    parts.push({ text: `Analysiere diesen Google Maps Link: ${link}` });
  } else if (name) {
    setLoading('Bewertungen werden gesucht...');
    let text = `Analysiere das Restaurant: ${name}`;
    if (city) text += ` in ${city}`;
    parts.push({ text });
  } else {
    showError('Bitte Name, Link oder Foto eingeben.');
    return;
  }

  try {
    const response = await fetch(
      `https://restcheck-proxy.dimitrios-iakobidis.workers.dev`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ role: 'user', parts }],
          tools: [{ google_search: {} }],
          generationConfig: { 
            temperature: 0.4, 
            maxOutputTokens: 2000,
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                name: { type: "STRING" },
                typ: { type: "STRING" },
                betriebsart: { type: "STRING" },
                alter: { type: "STRING" },
                preis: { type: "STRING" },
                staerken: { type: "STRING" },
                schwaechen: { type: "STRING" },
                fazit: { type: "STRING" }
              },
              required: ["name", "typ", "betriebsart", "alter", "preis", "staerken", "schwaechen", "fazit"]
            }
          }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Keine Antwort erhalten.');
    
    // Text säubern (Verpackung von Gemini wegwerfen)
    let saubererText = text.trim();
    if (saubererText.startsWith("```")) {
      saubererText = saubererText.replace(/^
