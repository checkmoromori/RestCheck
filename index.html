<title>RestCheck</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --accent: #e8c547;
    --accent2: #c4a832;
    --text: #f0ede8;
    --muted: #666;
    --danger: #e05a5a;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }
  header {
    padding: 10px 16px 6px;
    display: flex;
    align-items: center;
    gap: 9px;
    flex-shrink: 0;
  }
  .logo-icon { width: 32px; height: 32px; border-radius: 7px; object-fit: cover; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; color: var(--accent); }
  .logo span { color: var(--text); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 14px 10px;
    gap: 0;
    overflow: hidden;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    flex-shrink: 0;
  }
  .card-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .input-row { display: flex; gap: 7px; }
  .input-row input:first-child { flex: 1.8; }
  .input-row input:last-child { flex: 1; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 0;
    flex-shrink: 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .photo-row {
    display: flex;
    gap: 7px;
    flex-shrink: 0;
  }
  .photo-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    line-height: 1.3;
  }
  .photo-btn .icon { font-size: 20px; }
  .photo-btn:active { border-color: var(--accent); color: var(--accent); }
  .photo-btn.has-photo { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,0.08); }
  #fileInput, #galleryInput { display: none; }

  .preview-img {
    width: 100%;
    max-height: 70px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 7px;
    display: none;
    flex-shrink: 0;
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    flex-shrink: 0;
    margin-top: 8px;
  }
  .btn-primary:active { transform: scale(0.98); background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Result overlay */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    padding: var(--safe-top) 0 var(--safe-bottom);
  }
  .result-overlay.visible { display: flex; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .result-header-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 6px 12px;
    cursor: pointer;
  }
  .result-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .result-content { font-size: 14px; line-height: 1.8; color: var(--text); }
  .result-content .line { display: block; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .result-content .line:last-child { border-bottom: none; }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 99;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .loading-overlay.visible { display: flex; }
  .loading-dot { display: inline-block; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; margin: 0 3px; animation: bounce 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-8px); opacity: 1; } }
  .loading-text { font-family: 'Syne', sans-serif; font-size: 13px; color: var(--muted); letter-spacing: 0.5px; }

  .error {
    background: rgba(224,90,90,0.1);
    border: 1px solid rgba(224,90,90,0.3);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--danger);
    display: none;
    flex-shrink: 0;
    margin-top: 6px;
  }
</style>
</head>

</div>

<script>
const SYSTEM_PROMPT = "Du bist ein erfahrener Restaurant-Kritiker. Analysiere das vom Nutzer genannte Restaurant gründlich mithilfe der Google-Suche. Finde heraus, ob es sich um eine Kette/Franchise oder einen unabhängigen Familienbetrieb handelt und wie alt bzw. traditionsreich das Restaurant ist. Fülle das JSON-Schema detailliert, wahrheitsgemäß und in sauberem Deutsch aus.";

let photoBase64 = null, photoMime = null;

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    photoBase64 = dataUrl.split(',')[1];
    photoMime = file.type;
    const preview = document.getElementById('previewImg');
    preview.src = dataUrl;
    preview.style.display = 'block';
    document.getElementById('cameraBtn').classList.add('has-photo');
    document.getElementById('galleryBtn').classList.add('has-photo');
    document.getElementById('cameraBtn').innerHTML = '<span class="icon">✓</span><span>Foto geladen</span>';
    document.getElementById('galleryBtn').innerHTML = '<span class="icon">✓</span><span>Foto geladen</span>';
  };
  reader.readAsDataURL(file);
}

function setLoading(text) {
  document.getElementById('loading').classList.add('visible');
  document.getElementById('loadingText').textContent = text;
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('submitBtn').disabled = true;
}

function stopLoading() {
  document.getElementById('loading').classList.remove('visible');
  document.getElementById('submitBtn').disabled = false;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
  stopLoading();
}

function clearResult() {
  document.getElementById('result').classList.remove('visible');
  document.getElementById('nameInput').value = '';
  document.getElementById('cityInput').value = '';
  document.getElementById('linkInput').value = '';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('cameraBtn').classList.remove('has-photo');
  document.getElementById('galleryBtn').classList.remove('has-photo');
  document.getElementById('cameraBtn').innerHTML = '<span class="icon">📷</span><span>Kamera</span>';
  document.getElementById('galleryBtn').innerHTML = '<span class="icon">🖼️</span><span>Galerie</span>';
  photoBase64 = null; photoMime = null;
}

function showResult(text) {
  const content = document.getElementById('resultContent');
  const lines = text.split('\n').filter(l => l.trim());
  content.innerHTML = lines.map(l => `<span class="line">${escapeHtml(l)}</span>`).join('');
  document.getElementById('result').classList.add('visible');
  stopLoading();
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function analyze() {
  const name = document.getElementById('nameInput').value.trim();
  const city = document.getElementById('cityInput').value.trim();
  const link = document.getElementById('linkInput').value.trim();
  const parts = [];

  if (photoBase64) {
    setLoading('Foto wird analysiert...');
    parts.push({ inlineData: { mimeType: photoMime, data: photoBase64 } });
    let textPart = 'Bitte analysiere dieses Restaurant-Foto.';
    if (name) textPart += ` Name laut Nutzer: ${name}.`;
    if (city) textPart += ` Ort: ${city}.`;
    parts.push({ text: textPart });
  } else if (link) {
    setLoading('Link wird verarbeitet...');
    parts.push({ text: `Analysiere diesen Google Maps Link: ${link}` });
  } else if (name) {
    setLoading('Bewertungen werden gesucht...');
    let text = `Analysiere das Restaurant: ${name}`;
    if (city) text += ` in ${city}`;
    parts.push({ text });
  } else {
    showError('Bitte Name, Link oder Foto eingeben.');
    return;
  }

  try {
    const response = await fetch(
      `https://restcheck-proxy.dimitrios-iakobidis.workers.dev`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ role: 'user', parts }],
          tools: [{ google_search: {} }],
    generationConfig: { 
  temperature: 0.4, 
  maxOutputTokens: 2000,
  responseMimeType: "application/json",
  responseSchema: {
    type: "OBJECT",
    properties: {
      name: { type: "STRING" },
      typ: { type: "STRING" },
      betriebsart: { type: "STRING" },
      alter: { type: "STRING" },
      staerken: { type: "STRING" },
      schwaechen: { type: "STRING" },
      fazit: { type: "STRING" }
    },
    required: ["name", "typ", "betriebsart", "alter", "staerken", "schwaechen", "fazit"]
  }
}
        })
      }
    );
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }
    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Keine Antwort erhalten.');
    
    // 1. Den JSON-Text von Gemini in ein echtes Objekt umwandeln
    const restaurant = JSON.parse(text);
    
    // 2. Den Text schön formatiert zusammenbauen
const formatierterText = `
### ${restaurant.name} (${restaurant.typ})

**ℹ️ Betriebsart:** ${restaurant.betriebsart}
**⏳ Alter/Tradition:** ${restaurant.alter}

**👍 Stärken:**
${restaurant.staerken}

**👎 Schwächen:**
${restaurant.schwaechen}

**📝 Fazit:**
${restaurant.fazit}
    `.trim();

    // 3. An deine bestehende Funktion übergeben
    showResult(formatierterText);
  } catch (e) {
    showError('Fehler: ' + e.message);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) analyze();
});
</script>
</body>
</html>
