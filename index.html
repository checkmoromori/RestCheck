<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestCheck - Restaurant Kritiker</title>
  <style>
    :root {
      --bg-color: #faf6f0; /* Edles, warmes Cremeweiß */
      --card-bg: #ffffff;
      --text-color: #1e293b; /* Schickes Schiefer-Dunkelgrau */
      --primary: #d97706; /* Warmes Gourmet-Bernstein/Orange */
      --primary-hover: #b45309;
      --border: #e2e8f0;
      --accent-green: #10b981;
      --accent-red: #ef4444;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(217, 119, 6, 0.08); /* Sanfter bernsteinfarbener Schatten */
      width: 100%;
      max-width: 500px;
      border: 1px solid rgba(217, 119, 6, 0.1);
    }

    header {
      text-align: center;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 28px;
      color: var(--primary);
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 12px 12px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
      background: #f8fafc;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.15);
    }

    .file-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .file-btn {
      background: #fff;
      border: 1.5px dashed var(--primary);
      color: var(--primary);
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .file-btn:hover {
      background: rgba(217, 119, 6, 0.04);
      transform: translateY(-1px);
    }

    .file-btn.has-photo {
      background: #f0fdf4;
      border-color: var(--accent-green);
      color: #15803d;
    }

    input[type="file"] {
      display: none;
    }

    #previewImg {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 18px;
      display: none;
      border: 2px solid var(--border);
    }

    button.submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
    }

    button.submit-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(217, 119, 6, 0.3);
    }

    #output {
      margin-top: 25px;
      padding: 20px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid rgba(217, 119, 6, 0.15);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      display: none;
      line-height: 1.6;
    }

    /* Styling für das fertige Gastro-Review */
    .review-header {
      border-bottom: 2px solid #f1f5f9;
      padding-bottom: 12px;
      margin-bottom: 15px;
    }

    .review-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
    }

    .review-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .review-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 14px;
    }

    .review-section {
      margin-top: 15px;
    }

    .review-section-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .review-list {
      padding-left: 20px;
    }

    .review-fazit-box {
      background: #fffbeb;
      border-left: 4px solid var(--primary);
      padding: 12px;
      border-radius: 0 8px 8px 0;
      margin-top: 15px;
      font-style: italic;
    }

    .loading-spinner {
      text-align: center;
      color: #d97706;
      margin-top: 20px;
      display: none;
      font-weight: 600;
      font-size: 15px;
    }

    .loading-spinner::after {
      content: '...';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>🍽️ RestCheck</h1>
    <div class="subtitle">Dein persönlicher Gastro-Kritiker</div>
  </header>
  
  <div class="input-group">
    <label for="nameInput">Name des Restaurants</label>
    <div class="input-wrapper">
      <span class="input-icon">🏢</span>
      <input type="text" id="nameInput" placeholder="Z. B. Aposto">
    </div>
  </div>

  <div class="input-group">
    <label for="cityInput">Ort / Stadt (Europaweit)</label>
    <div class="input-wrapper">
      <span class="input-icon">📍</span>
      <input type="text" id="cityInput" placeholder="Z. B. Aalen oder Rom">
    </div>
  </div>

  <div class="input-group">
    <label for="linkInput">Google Maps Link (Alternativ)</label>
    <div class="input-wrapper">
      <span class="input-icon">🔗</span>
      <input type="text" id="linkInput" placeholder="Link hier einfügen...">
    </div>
  </div>

  <div class="file-buttons">
    <label class="file-btn" id="cameraBtn">
      <span>📸 Kamera</span>
      <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(this)">
    </label>
    <label class="file-btn" id="galleryBtn">
      <span>🖼️ Galerie</span>
      <input type="file" accept="image/*" onchange="handlePhoto(this)">
    </label>
  </div>

  <img id="previewImg" alt="Vorschau">

  <button class="submit-btn" onclick="analyze()">Kritik erstellen</button>

  <div class="loading-spinner" id="spinner">Gourmet-Kritiker sucht im Web</div>
  <div id="output"></div>
</div>

<script>
const SYSTEM_PROMPT = "Du bist ein erfahrener Restaurant-Kritiker. Analysiere das vom Nutzer genannte Restaurant gründlich mithilfe der Google-Suche. Finde heraus, ob es sich um eine Kette/Franchise oder einen unabhängigen Familienbetrieb handelt und wie alt bzw. traditionsreich das Restaurant ist. Fülle das JSON-Schema detailliert, wahrheitsgemäß und in sauberem Deutsch aus.";

let photoBase64 = null, photoMime = null;

// Foto-Upload verarbeiten
function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    photoBase64 = dataUrl.split(',')[1];
    photoMime = file.type;
    
    // Bild-Vorschau anzeigen
    const preview = document.getElementById('previewImg');
    preview.src = dataUrl;
    preview.style.display = 'block';
    
    // Knöpfe grün färben
    document.getElementById('cameraBtn').classList.add('has-photo');
    document.getElementById('galleryBtn').classList.add('has-photo');
    document.getElementById('cameraBtn').innerHTML = '<span>✓</span><span>Schild geladen</span>';
    document.getElementById('galleryBtn').innerHTML = '<span>✓</span><span>Schild geladen</span>';
  };
  reader.readAsDataURL(file);
}

// Lade-Anzeige umschalten
function setLoading(message) {
  const spinner = document.getElementById('spinner');
  const output = document.getElementById('output');
  if (message) {
    spinner.innerText = message;
    spinner.style.display = 'block';
    output.style.display = 'none';
  } else {
    spinner.style.display = 'none';
  }
}

// Ergebnis anzeigen
function showResult(text) {
  setLoading(false);
  const output = document.getElementById('output');
  output.innerHTML = text;
  output.style.display = 'block';
}

// Fehler anzeigen
function showError(message) {
  setLoading(false);
  const output = document.getElementById('output');
  output.innerHTML = `<div style="color: #dc2626; font-weight: 600; padding: 10px; background: #fef2f2; border-radius: 8px; border: 1px solid #fee2e2;">⚠️ ${message}</div>`;
  output.style.display = 'block';
}

// Die Hauptanalyse
async function analyze() {
  const name = document.getElementById('nameInput').value.trim();
  let city = document.getElementById('cityInput').value.trim();
  const link = document.getElementById('linkInput').value.trim();
  
  // ZWINGENDE ABFRAGE: Wenn ein Foto da ist, aber kein Ort eingegeben wurde
  if (photoBase64 && !city) {
    const urlaubsort = prompt("In welchem Ort oder Land befindet sich das Restaurant auf dem Foto?");
    if (urlaubsort) {
      city = urlaubsort.trim();
      document.getElementById('cityInput').value = city;
    }
  }

  const parts = [];

  if (photoBase64) {
    setLoading('Schild wird entziffert...');
    parts.push({ inlineData: { mimeType: photoMime, data: photoBase64 } });
    let textPart = 'Bitte lies den Restaurantnamen von diesem Schild ab.';
    if (city) textPart += ` Das Restaurant befindet sich in: ${city}.`;
    textPart += ' Nutze die Google-Suche, um es zu finden und fülle das JSON-Schema aus.';
    if (name) textPart += ` (Nutzerhinweis zum Namen: ${name})`;
    parts.push({ text: textPart });
  } else if (link) {
    setLoading('Link wird analysiert...');
    parts.push({ text: `Analysiere diesen Google Maps Link: ${link}` });
  } else if (name) {
    setLoading('Web-Recherche läuft...');
    let text = `Analysiere das Restaurant: ${name}`;
    if (city) text += ` in ${city}`;
    parts.push({ text });
  } else {
    showError('Bitte gib einen Restaurant-Namen, einen Link oder lade ein Foto hoch.');
    return;
  }

  try {
    const response = await fetch(
      `https://restcheck-proxy.dimitrios-iakobidis.workers.dev`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ role: 'user', parts }],
          tools: [{ google_search: {} }],
          generationConfig: { 
            temperature: 0.4, 
            maxOutputTokens: 2000,
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                name: { type: "STRING" },
                typ: { type: "STRING" },
                betriebsart: { type: "STRING" },
                alter: { type: "STRING" },
                preis: { type: "STRING" },
                staerken: { type: "STRING" },
                schwaechen: { type: "STRING" },
                fazit: { type: "STRING" }
              },
              required: ["name", "typ", "betriebsart", "alter", "preis", "staerken", "schwaechen", "fazit"]
            }
          }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Keine Antwort erhalten.');
    
    // Text säubern (Verpackung von Gemini wegwerfen)
    let saubererText = text.trim();
    if (saubererText.startsWith("```")) {
      saubererText = saubererText.replace(/^
