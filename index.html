<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestCheck - Der Gourmet-Kritiker</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="RestCheck">
  <link rel="apple-touch-icon" href="grafik.png">
  <link rel="icon" type="image/png" href="grafik.png">

  <style>
    :root {
      --bg-color: #fdfbf9; /* Warmes Champagner-Weiß */
      --card-bg: #ffffff;
      --text-main: #1c1917; /* Tiefes Antik-Schwarz */
      --text-muted: #57534e; /* Warmes Grau */
      --michelin-red: #9a000a; /* Legendäres Michelin-Rot */
      --accent-gold: #b48a3d; /* Elegantes, mattes Gold */
      --border-color: #e5e0da; /* Sehr feine, helle Linie */
      --shadow-premium: 0 20px 40px rgba(28, 25, 16, 0.04);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg-color) 100%);
      color: var(--text-main);
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: var(--card-bg);
      padding: 40px 35px;
      border-radius: 16px;
      box-shadow: var(--shadow-premium);
      width: 100%;
      max-width: 700px;
      border: 1px solid var(--border-color);
      position: relative;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--michelin-red), var(--accent-gold));
      border-radius: 16px 16px 0 0;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 1px double var(--border-color);
      padding-bottom: 20px;
    }

    h1 {
      font-family: "Georgia", serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    h1 span {
      color: var(--michelin-red);
    }

    .subtitle {
      font-size: 11px;
      color: var(--accent-gold);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.8;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 12px 12px 42px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      background: #fafafa;
    }

    input[type="text"]:focus {
      border-color: var(--accent-gold);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(180, 138, 61, 0.1);
    }

    .file-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .file-btn {
      background: #fff;
      border: 1px solid var(--border-color);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .file-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(180, 138, 61, 0.02);
    }

    .file-btn.has-photo {
      background: #f0fdf4;
      border-color: #16a34a;
      color: #14532d;
    }

    input[type="file"] {
      display: none;
    }

    #previewImg {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 18px;
      display: none;
      border: 1px solid var(--border-color);
    }

    button.submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--michelin-red) 0%, #7a0008 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(154, 0, 10, 0.15);
    }

    button.submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(154, 0, 10, 0.25);
    }

    #output {
      margin-top: 30px;
      padding: 25px;
      border-radius: 12px;
      background: #fffdfa;
      border: 1px solid rgba(180, 138, 61, 0.15);
      display: none;
      line-height: 1.6;
    }

    .review-header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      margin-bottom: 15px;
      text-align: center;
    }

    .review-title {
      font-family: "Georgia", serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text-main);
    }

    .review-badge {
      display: inline-block;
      background: #fef3c7;
      color: #78350f;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .review-meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* Nutzt die volle Breite in Spalten aus */
      gap: 15px;
      margin-bottom: 20px;
      background: #fafaf9;
      padding: 15px 20px;
      border-radius: 8px;
      border: 1px solid #f5f5f4;
    }

    .review-meta-item {
      display: flex;
      flex-direction: column; /* Icon/Titel über dem Wert */
      align-items: flex-start; /* Linksbündig statt zentriert */
      text-align: left;        /* Garantiert Linksbuendigkeit gegen Vererbung */
      font-size: 14px;
      line-height: 1.4;
    }

    .review-meta-item strong {
      color: var(--text-muted);
      width: auto;
      margin-bottom: 2px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .review-bullets {
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      border-left: 4px solid var(--border-color);
    }

    .review-bullets.positive {
      border-left-color: #10b981;
      background: #f0fdf4;
      color: #14532d;
    }

    .review-bullets.negative {
      border-left-color: #ef4444;
      background: #fdf2f2;
      color: #7f1d1d;
    }

    .review-fazit-box {
      background: #fffbeb;
      border-left: 4px solid var(--accent-gold);
      padding: 16px;
      border-radius: 0 8px 8px 0;
      font-style: italic;
      font-family: "Georgia", serif;
      font-size: 14.5px;
      color: #78350f;
    }

    .loading-spinner {
      text-align: center;
      color: var(--accent-gold);
      margin-top: 20px;
      display: none;
      font-weight: 700;
      font-size: 15px;
      font-style: italic;
      font-family: "Georgia", serif;
    }
  </style>
</head>
<body>

<div class="container">

  <div id="inputForm"> 
    <header>
      <h1>🍽️ Rest<span>Check</span></h1>
      <div class="subtitle">Echte Kritiken in Echtzeit</div>
    </header>
    
    <div class="input-group">
      <label for="nameInput">Name des Restaurants</label>
      <div class="input-wrapper">
        <span class="input-icon">🏢</span>
        <input type="text" id="nameInput" placeholder="Z. B. Aposto">
      </div>
    </div>

    <div class="input-group">
      <label for="cityInput">Ort / Stadt (Europaweit)</label>
      <div class="input-wrapper">
        <span class="input-icon">📍</span>
        <input type="text" id="cityInput" placeholder="Z. B. Aalen oder Rom">
      </div>
    </div>

    <div class="input-group">
      <label for="linkInput">Google Maps Link (Alternativ)</label>
      <div class="input-wrapper">
        <span class="input-icon">🔗</span>
        <input type="text" id="linkInput" placeholder="Link hier einfügen...">
      </div>
    </div>

    <div class="file-buttons">
      <label class="file-btn" id="cameraBtn">
        <span>📸 Kamera</span>
        <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(this)">
      </label>
      <label class="file-btn" id="galleryBtn">
        <span>🖼️ Galerie</span>
        <input type="file" accept="image/*" onchange="handlePhoto(this)">
      </label>
    </div>

    <img id="previewImg" alt="Vorschau">
    
    <button class="submit-btn" onclick="analyze()">Kritik erstellen</button>
  </div> 
  <div class="loading-spinner" id="spinner">Der Gourmet-Kritiker recherchiert...</div>
  <div id="output"></div>
</div>

<script>
const SYSTEM_PROMPT = 'Du bist ein erfahrener Restaurant-Kritiker. Analysiere das vom Nutzer genannte Restaurant gründlich mithilfe der Google-Suche. Antworte AUSSCHLIESSLICH im folgenden JSON-Format (keine Backticks, kein Markdown, kein Text davor oder danach):\n{\n  "name": "Name",\n  "typ": "Küche/Stil",\n  "betriebsart": "Familienbetrieb oder Kette",\n  "alter": "Tradition/Alter",\n  "preis": "Preisniveau",\n  "staerken": "Stärken (mit Zeilenumbrüchen)",\n  "schwaechen": "Schwächen (mit Zeilenumbrüchen)",\n  "fazit": "Fazit"\n}';

let photoBase64 = null, photoMime = null;

function handlePhoto(input) {
  try {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const dataUrl = e.target.result;
      photoBase64 = dataUrl.split(',')[1];
      photoMime = file.type;
      const preview = document.getElementById('previewImg');
      preview.src = dataUrl;
      preview.style.display = 'block';
      
      document.getElementById('cameraBtn').classList.add('has-photo');
      document.getElementById('galleryBtn').classList.add('has-photo');
      document.getElementById('cameraBtn').innerHTML = '<span>✓</span><span>Schild geladen</span>';
      document.getElementById('galleryBtn').innerHTML = '<span>✓</span><span>Schild geladen</span>';
    };
    reader.readAsDataURL(file);
  } catch (err) {
    console.error('Fehler beim Verarbeiten des Fotos:', err);
  }
}

function setLoading(message) {
  const spinner = document.getElementById('spinner');
  const output = document.getElementById('output');
  if (message) {
    spinner.innerText = message;
    spinner.style.display = 'block';
    output.style.display = 'none';
  } else {
    spinner.style.display = 'none';
  }
}

function showResult(text) {
  setLoading(false);
  const output = document.getElementById('output');
  output.innerHTML = text;
  output.style.display = 'block';
}

function showError(message) {
  setLoading(false);
  const output = document.getElementById('output');
  output.innerHTML = '<div style="color: #b91c1c; font-weight:600; padding:12px; background:#fdf2f2; border-radius:10px; border:1px solid #fca5a5; font-size:13px; word-break: break-all;">⚠️ ' + message + '</div>';
  output.style.display = 'block';
}

async function analyze() {
  console.log('Analyse gestartet...');
  
  const nameInput = document.getElementById('nameInput');
  const cityInput = document.getElementById('cityInput');
  const linkInput = document.getElementById('linkInput');

  if (!nameInput || !cityInput || !linkInput) {
    showError('Einige Eingabefelder konnten im Dokument nicht gefunden werden.');
    return;
  }

  const name = nameInput.value.trim();
  let city = cityInput.value.trim();
  const link = linkInput.value.trim();
  
  if (photoBase64 && !city) {
    const urlaubsort = prompt('In welchem Ort oder Land befindet sich das Restaurant auf dem Foto?');
    if (urlaubsort) {
      city = urlaubsort.trim();
      cityInput.value = city;
    } else {
      showError('Der Ort wird benötigt, um das Restaurant auf dem Foto richtig zuzuordnen.');
      return;
    }
  }

  const parts = [];

  if (photoBase64) {
    setLoading('Schild wird analysiert...');
    parts.push({ inlineData: { mimeType: photoMime, data: photoBase64 } });
    let textPart = 'Bitte lies den Restaurantnamen von diesem Schild ab.';
    if (city) textPart += ' Das Restaurant befindet sich in: ' + city + '.';
    textPart += ' Nutze die Google-Suche, um es zu finden und gib die Daten als reines JSON zurück.';
    if (name) textPart += ' (Nutzerhinweis zum Namen: ' + name + ')';
    parts.push({ text: textPart });
  } else if (link) {
    setLoading('Link wird verarbeitet...');
    parts.push({ text: 'Analysiere diesen Google Maps Link und gib das JSON aus: ' + link });
  } else if (name) {
    setLoading('Gourmet-Datenbank wird durchsucht...');
    let text = 'Analysiere das Restaurant: ' + name;
    if (city) text += ' in ' + city;
    text += '. Gib das Ergebnis als reines JSON aus.';
    parts.push({ text: text });
  } else {
    showError('Bitte gib einen Restaurant-Namen, einen Link oder lade ein Foto hoch.');
    return;
  }

  try {
    console.log('Sende Anfrage an den Worker...');
    const response = await fetch(
      'https://restcheck-proxy.dimitrios-iakobidis.workers.dev',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ role: 'user', parts: parts }],
          tools: [{ google_search: {} }],
          generationConfig: { 
            temperature: 0.3, 
            maxOutputTokens: 2000
          }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || ('HTTP ' + response.status));
    }

    const data = await response.json();
    console.log('API-Antwort vom Proxy erhalten:', data);

    let text = '';
    if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
      text = data.candidates[0].content.parts[0].text;
    } else if (data.text) {
      text = data.text;
    } else if (data.response) {
      text = data.response;
    } else if (typeof data === 'string') {
      text = data;
    } else {
      throw new Error('Unerwartete Server-Struktur: ' + JSON.stringify(data));
    }

    if (!text) {
      if (data.promptFeedback?.blockReason) {
        throw new Error('Die Anfrage wurde durch den Sicherheitsfilter blockiert: ' + data.promptFeedback.blockReason);
      }
      throw new Error('Der Server hat geantwortet, aber kein Text-Inhalt war in der Antwort vorhanden.');
    }
    
    let saubererText = text.trim();
    const backticks = String.fromCharCode(96, 96, 96);
    if (saubererText.indexOf(backticks) === 0) {
      saubererText = saubererText.slice(3);
      if (saubererText.toLowerCase().indexOf('json') === 0) {
        saubererText = saubererText.slice(4);
      }
    }
    if (saubererText.lastIndexOf(backticks) === saubererText.length - 3 && saubererText.length >= 6) {
      saubererText = saubererText.slice(0, -3);
    }
    saubererText = saubererText.trim();

    const startKlammer = saubererText.indexOf('{');
    const endKlammer = saubererText.lastIndexOf('}');
    if (startKlammer !== -1 && endKlammer !== -1) {
      saubererText = saubererText.substring(startKlammer, endKlammer + 1);
    } else {
      throw new Error('Die Antwort der KI enthält kein lesbares JSON-Format: ' + saubererText);
    }

    const restaurant = JSON.parse(saubererText);
    
    let formatierterText = '';
    formatierterText += '<div class="review-header">';
    formatierterText += '  <div class="review-title">🏠 ' + restaurant.name + '</div>';
    formatierterText += '  <div class="review-badge">' + restaurant.typ + '</div>';
    formatierterText += '</div>';
    
    formatierterText += '<div class="review-meta-grid">';
    formatierterText += '  <div class="review-meta-item">';
    formatierterText += '    <strong>👨‍👩‍👧‍👦 Betriebsart:</strong> <span>' + restaurant.betriebsart + '</span>';
    formatierterText += '  </div>';
    formatierterText += '  <div class="review-meta-item">';
    formatierterText += '    <strong>⏳ Tradition:</strong> <span>' + restaurant.alter + '</span>';
    formatierterText += '  </div>';
    formatierterText += '  <div class="review-meta-item">';
    formatierterText += '    <strong>💰 Preisniveau:</strong> <span>' + restaurant.preis + '</span>';
    formatierterText += '  </div>';
    formatierterText += '</div>';

    formatierterText += '<div class="review-section">';
    formatierterText += '  <div class="review-section-title" style="color: #10b981;">✨ Stärken & Vorzüge</div>';
    formatierterText += '  <div class="review-bullets positive">';
    formatierterText += restaurant.staerken.replace(/\n/g, '<br>');
    formatierterText += '  </div>';
    formatierterText += '</div>';

    formatierterText += '<div class="review-section">';
    formatierterText += '  <div class="review-section-title" style="color: #ef4444;">⚠️ Schwachpunkte</div>';
    formatierterText += '  <div class="review-bullets negative">';
    formatierterText += restaurant.schwaechen.replace(/\n/g, '<br>');
    formatierterText += '  </div>';
    formatierterText += '</div>';

    formatierterText += '<div class="review-section">';
    formatierterText += '  <div class="review-section-title" style="color: var(--accent-gold);">📝 Kritiker-Fazit</div>';
    formatierterText += '  <div class="review-fazit-box">';
    formatierterText += '    "' + restaurant.fazit + '"';
    formatierterText += '  </div>';
    formatierterText += '</div>';

    // Blendet das komplette Eingabeformular aus
    const form = document.getElementById('inputForm');
    if (form) form.style.display = 'none';

    // Ein eleganter Mini-Header für die neue Kritik-Seite
    let kritikHeader = '<div class="review-header" style="margin-bottom: 25px;"><h1 style="font-family: Georgia, serif; font-size: 24px;">🍽️ Rest<span style="color: var(--michelin-red);">Check</span></h1><div class="subtitle" style="font-size: 9px; color: var(--accent-gold); letter-spacing: 2px;">Exklusive Gourmet-Analyse</div></div>';
    formatierterText = kritikHeader + formatierterText;

    // Fügt den "Zurück"-Button ans Ende an
    formatierterText += '<button onclick="window.location.reload()" style="margin-top: 30px; width: 100%; padding: 12px; background: none; border: 1px solid var(--accent-gold); color: var(--accent-gold); border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">Neue Kritik erstellen</button>';

    showResult(formatierterText);
  } catch (e) {
    showError('Kritik fehlgeschlagen: ' + e.message);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    analyze();
  }
});
</script>
</body>
</html>
