<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestCheck - Der Gourmet-Kritiker</title>
  <style>
    :root {
      --bg-color: #fcfbfa;
      --card-bg: #ffffff;
      --text-main: #1c1917;
      --text-muted: #57534e;
      --primary-gold: #c2410c;
      --accent-gold: #b45309;
      --border-color: #f5f5f4;
      --shadow-premium: 0 20px 40px rgba(28, 25, 16, 0.04);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg-color) 100%);
      color: var(--text-main);
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: var(--card-bg);
      padding: 35px 30px;
      border-radius: 24px;
      box-shadow: var(--shadow-premium);
      width: 100%;
      max-width: 500px;
      border: 1px solid rgba(194, 65, 12, 0.06);
      position: relative;
    }
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary-gold), var(--accent-gold));
      border-radius: 24px 24px 0 0;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    h1 {
      font-family: "Georgia", serif;
      font-size: 30px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    h1 span { color: var(--primary-gold); }
    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .input-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    .input-wrapper { position: relative; }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 12px 12px 42px;
      border: 1.5px solid #e7e5e4;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      background: #fafaf9;
    }
    input[type="text"]:focus {
      border-color: var(--accent-gold);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(180, 83, 9, 0.1);
    }
    .file-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }
    .file-btn {
      background: #fff;
      border: 1.5px solid #e7e5e4;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }
    .file-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(180, 83, 9, 0.02);
    }
    .file-btn.has-photo {
      background: #f0fdf4;
      border-color: #16a34a;
      color: #14532d;
    }
    input[type="file"] { display: none; }
    #previewImg {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 18px;
      display: none;
      border: 2px solid #e7e5e4;
    }
    button.submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-gold) 0%, var(--accent-gold) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(194, 65, 12, 0.15);
    }
    button.submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(194, 65, 12, 0.2);
    }
    #output {
      margin-top: 25px;
      padding: 22px;
      border-radius: 18px;
      background: #fffdfa;
      border: 1px solid rgba(180, 83, 9, 0.12);
      display: none;
      line-height: 1.6;
    }
    .review-header {
      border-bottom: 2px solid #f5f5f4;
      padding-bottom: 12px;
      margin-bottom: 15px;
      text-align: center;
    }
    .review-title {
      font-family: "Georgia", serif;
      font-size: 22px;
      font-weight: 800;
    }
    .review-badge {
      display: inline-block;
      background: #fef3c7;
      color: #78350f;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 6px;
      text-transform: uppercase;
    }
    .review-meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 15px;
      background: #fafaf9;
      padding: 12px;
      border-radius: 10px;
    }
    .review-meta-item {
      display: flex;
      font-size: 13.5px;
    }
    .review-meta-item strong {
      color: var(--text-muted);
      width: 100px;
    }
    .review-section { margin-top: 15px; }
    .review-section-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .review-bullets {
      padding: 12px;
      border-radius: 10px;
      font-size: 13.5px;
      border-left: 4px solid #e7e5e4;
    }
    .review-bullets.positive {
      border-left-color: #10b981;
      background: #f0fdf4;
      color: #14532d;
    }
    .review-bullets.negative {
      border-left-color: #ef4444;
      background: #fdf2f2;
      color: #7f1d1d;
    }
    .review-fazit-box {
      background: #fffbeb;
      border-left: 4px solid var(--accent-gold);
      padding: 14px;
      border-radius: 0 10px 10px 0;
      font-style: italic;
      font-size: 13.5px;
      color: #78350f;
    }
    .loading-spinner {
      text-align: center;
      color: var(--accent-gold);
      margin-top: 20px;
      display: none;
      font-weight: 700;
      font-size: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>🍽️ Rest<span>Check</span></h1>
    <div class="subtitle">Gourmet-Kritiken in Echtzeit</div>
  </header>
  
  <div class="input-group">
    <label for="nameInput">Name des Restaurants</label>
    <div class="input-wrapper">
      <span class="input-icon">🏢</span>
      <input type="text" id="nameInput" placeholder="Z. B. Aposto">
    </div>
  </div>

  <div class="input-group">
    <label for="cityInput">Ort / Stadt (Europaweit)</label>
    <div class="input-wrapper">
      <span class="input-icon">📍</span>
      <input type="text" id="cityInput" placeholder="Z. B. Aalen oder Rom">
    </div>
  </div>

  <div class="input-group">
    <label for="linkInput">Google Maps Link (Alternativ)</label>
    <div class="input-wrapper">
      <span class="input-icon">🔗</span>
      <input type="text" id="linkInput" placeholder="Link hier einfügen...">
    </div>
  </div>

  <div class="file-buttons">
    <label class="file-btn" id="cameraBtn">
      <span>📸 Kamera</span>
      <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(this)">
    </label>
    <label class="file-btn" id="galleryBtn">
      <span>🖼️ Galerie</span>
      <input type="file" accept="image/*" onchange="handlePhoto(this)">
    </label>
  </div>

  <img id="previewImg" alt="Vorschau">

  <button class="submit-btn" onclick="analyze()">Kritik erstellen</button>

  <div class="loading-spinner" id="spinner">Der Gourmet-Kritiker recherchiert...</div>
  <div id="output"></div>
</div>

<script>
const SYSTEM_PROMPT = "Du bist ein erfahrener Restaurant-Kritiker. Analysiere das vom Nutzer genannte Restaurant gründlich mithilfe der Google-Suche. Finde heraus, ob es sich um eine Kette/Franchise oder einen unabhängigen Familienbetrieb handelt und wie alt bzw. traditionsreich das Restaurant ist. Fülle das JSON-Schema detailliert, wahrheitsgemäß und in sauberem Deutsch aus.";

let photoBase64 = null, photoMime = null;

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    photoBase64 = dataUrl.split(',')[1];
    photoMime = file.type;
    const preview = document.getElementById('previewImg');
    preview.src = dataUrl;
    preview.style.display = 'block';
    
    document.getElementById('cameraBtn').classList.add('has-photo');
    document.getElementById('galleryBtn').classList.add('has-photo');
    document.getElementById('cameraBtn').innerHTML = '<span>✓</span><span>Schild geladen</span>';
    document.getElementById('galleryBtn').innerHTML = '<span>✓</span><span>Schild geladen</span>';
  };
  reader.readAsDataURL(file);
}

function setLoading(message) {
  const spinner = document.getElementById('spinner');
  const output = document.getElementById('output');
  if (message) {
    spinner.innerText = message;
    spinner.style.display = 'block';
    output.style.display = 'none';
  } else {
    spinner.style.display = 'none';
  }
}

function showResult(text) {
  setLoading(false);
  const output = document.getElementById('output');
  output.innerHTML = text;
  output.style.display = 'block';
}

function showError(message) {
  setLoading(false);
  const output = document.getElementById('output');
  output.innerHTML = `<div style="color: #b91c1c; font-weight:600; padding:12px; background:#fdf2f2; border-radius:10px; border:1px solid #fca5a5; font-size:13px;">⚠️ ${message}</div>`;
  output.style.display = 'block';
}

async function analyze() {
  const name = document.getElementById('nameInput').value.trim();
  let city = document.getElementById('cityInput').value.trim();
  const link = document.getElementById('linkInput').value.trim();
  
  if (photoBase64 && !city) {
    const urlaubsort = prompt("In welchem Ort oder Land befindet sich das Restaurant auf dem Foto?");
    if (urlaubsort) {
      city = urlaubsort.trim();
      document.getElementById('cityInput').value = city;
    }
  }

  const parts = [];

  if (photoBase64) {
    setLoading('Schild wird analysiert...');
    parts.push({ inlineData: { mimeType: photoMime, data: photoBase64 } });
    let textPart = 'Bitte lies den Restaurantnamen von diesem Schild ab.';
    if (city) textPart += ` Das Restaurant befindet sich in: ${city}.`;
    textPart += ' Nutze die Google-Suche, um es zu finden und fülle das JSON-Schema aus.';
    if (name) textPart += ` (Nutzerhinweis zum Namen: ${name})`;
    parts.push({ text: textPart });
  } else if (link) {
    setLoading('Link wird verarbeitet...');
    parts.push({ text: `Analysiere diesen Google Maps Link: ${link}` });
  } else if (name) {
    setLoading('Gourmet-Datenbank wird durchsucht...');
    let text = `Analysiere das Restaurant: ${name}`;
    if (city) text += ` in ${city}`;
    parts.push({ text });
  } else {
    showError('Bitte gib einen Restaurant-Namen, einen Link oder lade ein Foto hoch.');
    return;
  }

  try {
    const response = await fetch(
      `https://restcheck-proxy.dimitrios-iakobidis.workers.dev`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ role: 'user', parts }],
          tools: [{ google_search: {} }],
          generationConfig: { 
            temperature: 0.4, 
            maxOutputTokens: 2000,
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                name: { type: "STRING" },
                typ: { type: "STRING" },
                betriebsart: { type: "STRING" },
                alter: { type: "STRING" },
                preis: { type: "STRING" },
                staerken: { type: "STRING" },
                schwaechen: { type: "STRING" },
                fazit: { type: "STRING" }
              },
              required: ["name", "typ", "betriebsart", "alter", "preis", "staerken", "schwaechen", "fazit"]
            }
          }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Keine Antwort erhalten.');
    
    let saubererText = text.trim();
    if (saubererText.startsWith("```")) {
      saubererText = saubererText.replace(/^
